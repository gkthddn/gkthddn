<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 스포츠 트레이너 & 운동 일지</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background-color: #121212; color: #e0e0e0; }
  </style>
</head>
<body class="p-6 max-w-md mx-auto font-sans">

  <header class="text-center my-6">
    <h1 class="text-3xl font-extrabold text-lime-400">⚡ AI 핏 트레이너</h1>
    <p class="text-sm text-gray-400">오늘의 운동을 기록하고 AI의 피드백을 받으세요</p>
  </header>

  <div id="auth-section" class="bg-gray-900 p-5 rounded-xl shadow-lg border border-gray-800">
    <h2 id="auth-title" class="text-xl font-bold mb-4 text-white text-center">로그인 / 회원가입</h2>
    <input type="email" id="auth-email" placeholder="이메일 주소" class="w-full p-3 mb-2 rounded bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-lime-400">
    <input type="password" id="auth-password" placeholder="비밀번호 (6자리 이상)" class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-lime-400">
    <div class="flex gap-2">
      <button onclick="handleAuth('signin')" class="flex-1 bg-lime-500 hover:bg-lime-600 text-black font-bold p-3 rounded transition">로그인</button>
      <button onclick="handleAuth('signup')" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold p-3 rounded transition">회원가입</button>
    </div>
  </div>

  <div id="main-app" class="hidden space-y-6">
    <div class="flex justify-between items-center bg-gray-900 p-3 rounded-lg border border-gray-800">
      <span id="user-display" class="text-sm text-gray-300 font-semibold"></span>
      <button onclick="logout()" class="text-xs bg-red-900 text-red-200 px-3 py-1 rounded hover:bg-red-800">로그아웃</button>
    </div>

    <div class="bg-gray-900 p-5 rounded-xl shadow-lg border border-gray-800">
      <h3 class="text-lg font-bold mb-3 text-lime-400">🏋️‍♂️ 오늘의 운동 기록</h3>
      <input type="text" id="workout-name" placeholder="예: 스쿼트, 벤치프레스" class="w-full p-3 mb-2 rounded bg-gray-800 border border-gray-700 text-white">
      <div class="flex gap-2 mb-3">
        <input type="number" id="workout-sets" placeholder="세트 수" class="w-1/2 p-3 rounded bg-gray-800 border border-gray-700 text-white">
        <input type="number" id="workout-reps" placeholder="반복 횟수" class="w-1/2 p-3 rounded bg-gray-800 border border-gray-700 text-white">
      </div>
      <button onclick="saveWorkout()" class="w-full bg-lime-500 hover:bg-lime-600 text-black font-bold p-3 rounded transition">기록 저장 및 AI 코칭받기</button>
    </div>

    <div id="ai-section" class="bg-gray-900 p-5 rounded-xl shadow-lg border border-gray-800 hidden">
      <h3 class="text-lg font-bold mb-2 text-cyan-400 flex items-center gap-2">
        🤖 AI 트레이너 피드백
      </h3>
      <div id="ai-loading" class="text-gray-400 text-sm hidden animate-pulse">트레이너가 분석 중입니다... 잠시만 기다려주세요.</div>
      <p id="ai-response" class="text-white italic bg-gray-850 p-3 rounded border-l-4 border-cyan-400 mb-3 whitespace-pre-line"></p>
      <button id="tts-btn" onclick="speakResponse()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold p-2 rounded text-sm transition flex items-center justify-center gap-2">
        🔊 목소리로 듣기
      </button>
    </div>

    <div class="bg-gray-900 p-5 rounded-xl shadow-lg border border-gray-800">
      <h3 class="text-lg font-bold mb-3 text-white">📅 히스토리</h3>
      <ul id="history-list" class="space-y-2 max-h-60 overflow-y-auto pr-1">
        </ul>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    // ⚠️ 구글 앱스크립트 배포 후 받은 웹 앱 URL을 여기에 붙여넣으세요!
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyJLu04GuXz9GmvtHx8TFP9OKCwKbvkA2cdvVIjnjNAyLGsbDaOgrZjvJ6hNC5RydhB4g/exec";

    // 사용자가 제공한 Firebase 설정 정보
    const firebaseConfig = {
      apiKey: "AIzaSyCVdHTtZgRWqDOQMmdrWKKUX1884q-0tnk",
      authDomain: "gkthddn.firebaseapp.com",
      databaseURL: "https://gkthddn-default-rtdb.firebaseio.com",
      projectId: "gkthddn",
      storageBucket: "gkthddn.firebasestorage.app",
      messagingSenderId: "184587229377",
      appId: "1:184587229377:web:0ef339b72f9c95cd905c40",
      measurementId: "G-J1PNJLVVTX"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;
    let currentAiReply = "";

    // [인증] 회원가입 및 로그인 처리
    function handleAuth(type) {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;

      if(!email || !password) return alert('이메일과 비밀번호를 입력해주세요.');

      if(type === 'signup') {
        auth.createUserWithEmailAndPassword(email, password)
          .then(() => alert('회원가입 성공! 자동 로그인됩니다.'))
          .catch(err => alert('회원가입 실패: ' + err.message));
      } else {
        auth.signInWithEmailAndPassword(email, password)
          .catch(err => alert('로그인 실패: ' + err.message));
      }
    }

    // [인증] 로그아웃
    function logout() {
      auth.signOut();
    }

    // [인증] 로그인 상태 감지 리스너
    auth.onAuthStateChanged(user => {
      const authSec = document.getElementById('auth-section');
      const mainApp = document.getElementById('main-app');
      
      if (user) {
        currentUser = user;
        authSec.classList.add('hidden');
        mainApp.classList.remove('hidden');
        document.getElementById('user-display').innerText = `👤 ${user.email.split('@')[0]} 님`;
        loadHistory(user.uid);
      } else {
        currentUser = null;
        authSec.classList.remove('hidden');
        mainApp.classList.add('hidden');
      }
    });

    // [데이터베이스] 운동 기록 저장 및 AI 트리거
    function saveWorkout() {
      if(!currentUser) return;
      
      const name = document.getElementById('workout-name').value;
      const sets = document.getElementById('workout-sets').value;
      const reps = document.getElementById('workout-reps').value;

      if(!name || !sets || !reps) return alert('모든 운동 정보를 입력해주세요.');

      const workoutData = {
        name: name,
        sets: sets,
        reps: reps,
        timestamp: new Date().toLocaleString('ko-KR')
      };

      // 1. Firebase Realtime DB에 저장
      database.ref('users/' + currentUser.uid + '/logs').push(workoutData)
        .then(() => {
          // 입력창 초기화
          document.getElementById('workout-name').value = '';
          document.getElementById('workout-sets').value = '';
          document.getElementById('workout-reps').value = '';
          
          // 2. AI 피드백 요청하기
          getAiFeedback(`${name} 운동을 ${sets}세트, 각 세트당 ${reps}회 완료했습니다. 이에 대해 피드백해줘.`);
        })
        .catch(err => alert('저장 실패: ' + err.message));
    }

    // [데이터베이스] 과거 기록 실시간 동기화 호출
    function loadHistory(uid) {
      const historyList = document.getElementById('history-list');
      database.ref('users/' + uid + '/logs').on('value', snapshot => {
        historyList.innerHTML = '';
        const data = snapshot.val();
        if(!data) {
          historyList.innerHTML = '<li class="text-gray-500 text-sm text-center">아직 기록이 없습니다.</li>';
          return;
        }
        
        // 최신 기록이 맨 위로 오도록 역순 정렬 처리
        Object.values(data).reverse().forEach(log => {
          const li = document.createElement('li');
          li.className = "bg-gray-800 p-3 rounded border border-gray-750 text-sm";
          li.innerHTML = `
            <div class="flex justify-between text-xs text-gray-400 mb-1">
              <span>${log.timestamp}</span>
            </div>
            <span class="text-lime-400 font-bold">${log.name}</span> - ${log.sets}세트 x ${log.reps}회
          `;
          historyList.appendChild(li);
        });
      });
    }

    // [생성형 AI] GAS를 거쳐 OpenAI API 연동하기
    function getAiFeedback(promptText) {
      const aiSection = document.getElementById('ai-section');
      const loading = document.getElementById('ai-loading');
      const responseEl = document.getElementById('ai-response');

      aiSection.classList.remove('hidden');
      loading.classList.remove('hidden');
      responseEl.innerText = '';

      if (GAS_WEB_APP_URL === "YOUR_GAS_WEB_APP_URL") {
        loading.classList.add('hidden');
        responseEl.innerText = "⚠️ 구글 앱스크립트 URL이 설정되지 않았습니다. 코드를 확인해주세요.";
        return;
      }

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ prompt: promptText })
      })
      .then(res => res.json())
      .then(data => {
        loading.classList.add('hidden');
        if(data.reply) {
          currentAiReply = data.reply;
          responseEl.innerText = data.reply;
          // 피드백이 오면 자동으로 읽어주는 센스!
          speakResponse();
        } else {
          responseEl.innerText = "피드백을 가져오는 도중 에러가 발생했습니다.";
        }
      })
      .catch(err => {
        loading.classList.add('hidden');
        responseEl.innerText = "네트워크 요류 또는 GAS 주소 오류가 발생했습니다.";
        console.error(err);
      });
    }

    // [TTS] Web Speech API를 활용한 음성 읽기 기능
    function speakResponse() {
      if(!currentAiReply) return;

      // 브라우저에 말하고 있는 음성이 있다면 정지시킴
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(currentAiReply);
      utterance.lang = 'ko-KR'; // 한국어 설정
      utterance.rate = 1.0;     // 속도 설정 (0.5 ~ 2.0)
      utterance.pitch = 1.0;    // 음높이 설정

      // 가끔 한국어 구글 목소리를 강제 매핑하기 위한 코드
      const voices = window.speechSynthesis.getVoices();
      const korVoice = voices.find(voice => voice.lang.includes('ko'));
      if(korVoice) utterance.voice = korVoice;

      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
