<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 스포츠 트레이너 & 기록 일지</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; }
    /* 스크롤바 커스텀 (히스토리 기록용) */
    ul::-webkit-scrollbar { width: 6px; }
    ul::-webkit-scrollbar-track { background: transparent; }
    ul::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body class="p-6 md:p-10 font-sans">

  <header class="text-center my-8 md:my-12">
    <h1 class="text-4xl font-extrabold text-lime-400">⚡ AI 스포츠 트레이너 & 기록 일지</h1>
    <p class="text-gray-400 mt-2">AI에게 운동 루틴을 추천받고, 오늘 한 운동을 일지에 기록해 보세요</p>
  </header>

  <div id="auth-section" class="max-w-md mx-auto bg-slate-900 p-8 rounded-2xl shadow-xl border border-slate-800">
    <h2 id="auth-title" class="text-2xl font-bold mb-6 text-white text-center">로그인 / 회원가입</h2>
    <input type="email" id="auth-email" placeholder="이메일 주소" class="w-full p-4 mb-3 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-lime-400">
    <input type="password" id="auth-password" placeholder="비밀번호 (6자리 이상)" class="w-full p-4 mb-6 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-lime-400">
    <div class="flex gap-3">
      <button onclick="handleAuth('signin')" class="flex-1 bg-lime-500 hover:bg-lime-600 text-black font-bold p-4 rounded-lg transition text-lg">로그인</button>
      <button onclick="handleAuth('signup')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold p-4 rounded-lg transition text-lg">회원가입</button>
    </div>
  </div>

  <div id="main-app" class="hidden space-y-8">
    
    <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800">
      <span id="user-display" class="text-gray-300 font-semibold"></span>
      <button onclick="logout()" class="text-sm bg-red-950 text-red-300 px-4 py-2 rounded-lg hover:bg-red-900 transition">로그아웃</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
      <div id="ai-chat-column" class="bg-slate-900 p-6 rounded-2xl shadow-lg border border-slate-800 space-y-6">
        <h3 class="text-2xl font-bold text-lime-400">🤖 AI 트레이너 가이드</h3>
        
        <div class="space-y-3">
          <label class="text-sm text-gray-400">축구 전 스트레칭 루틴, 다이어트 식단 등 무엇이든 물어보세요!</label>
          <textarea id="ai-question" rows="5" placeholder="예: '축구 경기 전 스트레칭 루틴 짜줘', '하체 운동 순서 추천해줘'" class="w-full p-4 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-lime-400 resize-none"></textarea>
          <button onclick="sendQuestionToAi()" class="w-full bg-lime-500 hover:bg-lime-600 text-black font-bold p-4 rounded-lg transition text-lg">AI에게 질문하기</button>
        </div>

        <div id="ai-response-area" class="mt-8 border-t border-slate-800 pt-6 hidden">
          <div id="ai-loading" class="text-gray-400 text-sm animate-pulse mb-3">트레이너가 답변을 작성하고 있습니다...</div>
          <p id="ai-response" class="text-white italic bg-slate-950 p-5 rounded-lg border-l-4 border-cyan-400 mb-4 whitespace-pre-line text-base"></p>
          <button id="tts-btn" onclick="speakResponse()" class="w-full bg-cyan-700 hover:bg-cyan-600 text-white font-bold p-3 rounded-lg text-sm transition flex items-center justify-center gap-2">
            🔊 목소리로 답변 듣기
          </button>
        </div>
      </div>

      <div id="workout-log-column" class="bg-slate-900 p-6 rounded-2xl shadow-lg border border-slate-800 space-y-8">
        <div>
          <h3 class="text-2xl font-bold text-lime-400 mb-6">📅 오늘의 운동 기록 일지</h3>
          
          <div class="space-y-3">
            <label class="text-sm text-gray-400">오늘 완료한 운동을 기록해 두세요 (AI와 연동되지 않는 나만의 일지입니다)</label>
            <input type="text" id="workout-name" placeholder="운동 이름 (예: 스쿼트, 벤치프레스, 축구 연습)" class="w-full p-4 rounded-lg bg-slate-800 border border-slate-700 text-white">
            <div class="flex gap-3">
              <input type="number" id="workout-sets" placeholder="세트 수 (또는 시간/분)" class="w-1/2 p-4 rounded-lg bg-slate-800 border border-slate-700 text-white">
              <input type="number" id="workout-reps" placeholder="반복 횟수" class="w-1/2 p-4 rounded-lg bg-slate-800 border border-slate-700 text-white">
            </div>
            <button onclick="saveWorkout()" class="w-full bg-lime-500 hover:bg-lime-600 text-black font-bold p-4 rounded-lg transition text-lg">운동 기록 저장</button>
          </div>
        </div>

        <div>
          <h4 class="text-lg font-bold text-white mb-4">내 운동 히스토리</h4>
          <ul id="history-list" class="space-y-3 max-h-80 overflow-y-auto pr-2">
            </ul>
        </div>
      </div>

    </div> </div> <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    // 🔗 제공해주신 앱스크립트 배포 주소 연동
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzlEgOlUtKNULqcd5FLJAZRQoYKOk2gDYmSGPF1jNO4UzUn9Z-CzxQpmS3Jg05Il98sQA/exec"; 

    // 제공해주신 Firebase 설정 정보
    const firebaseConfig = {
      apiKey: "AIzaSyCVdHTtZgRWqDOQMmdrWKKUX1884q-0tnk",
      authDomain: "gkthddn.firebaseapp.com",
      databaseURL: "https://gkthddn-default-rtdb.firebaseio.com",
      projectId: "gkthddn",
      storageBucket: "gkthddn.firebasestorage.app",
      messagingSenderId: "184587229377",
      appId: "1:184587229377:web:0ef339b72f9c95cd905c40",
      measurementId: "G-J1PNJLVVTX"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;
    let currentAiReply = "";

    // [Firebase Auth] 로그인 / 회원가입 기능
    function handleAuth(type) {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;

      if(!email || !password) return alert('이메일과 비밀번호를 입력해주세요.');

      if(type === 'signup') {
        auth.createUserWithEmailAndPassword(email, password)
          .then(() => alert('회원가입 성공! 자동으로 로그인됩니다.'))
          .catch(err => alert('회원가입 실패: ' + err.message));
      } else {
        auth.signInWithEmailAndPassword(email, password)
          .catch(err => alert('로그인 실패: ' + err.message));
      }
    }

    // [Firebase Auth] 로그아웃
    function logout() {
      auth.signOut();
    }

    // [Firebase Auth] 로그인 상태 실시간 리스너
    auth.onAuthStateChanged(user => {
      const authSec = document.getElementById('auth-section');
      const mainApp = document.getElementById('main-app');
      
      if (user) {
        currentUser = user;
        authSec.classList.add('hidden');
        mainApp.classList.remove('hidden');
        document.getElementById('user-display').innerText = `👤 ${user.email.split('@')[0]} 회원님 환영합니다!`;
        loadHistory(user.uid);
      } else {
        currentUser = null;
        authSec.classList.remove('hidden');
        mainApp.classList.add('hidden');
      }
    });

    // ➡️ [오른쪽 칼럼 전용] 순수 운동 기록 저장 기능 (AI 통신을 전혀 하지 않음)
    function saveWorkout() {
      if(!currentUser) return;
      
      const name = document.getElementById('workout-name').value;
      const sets = document.getElementById('workout-sets').value;
      const reps = document.getElementById('workout-reps').value;

      if(!name || !sets || !reps) return alert('모든 운동 정보를 입력해주세요.');

      const workoutData = {
        name: name,
        sets: sets,
        reps: reps,
        timestamp: new Date().toLocaleString('ko-KR')
      };

      // 오직 Firebase Realtime Database에만 기록을 밀어 넣습니다.
      database.ref('users/' + currentUser.uid + '/logs').push(workoutData)
        .then(() => {
          document.getElementById('workout-name').value = '';
          document.getElementById('workout-sets').value = '';
          document.getElementById('workout-reps').value = '';
          alert('기록 일지에 성공적으로 저장되었습니다!');
        })
        .catch(err => alert('저장 실패: ' + err.message));
    }

    // ➡️ [오른쪽 칼럼 전용] 운동 히스토리 실시간 목록 갱신
    function loadHistory(uid) {
      const historyList = document.getElementById('history-list');
      database.ref('users/' + uid + '/logs').on('value', snapshot => {
        historyList.innerHTML = '';
        const data = snapshot.val();
        if(!data) {
          historyList.innerHTML = '<li class="text-gray-500 text-sm text-center">아직 작성된 운동 일지가 없습니다.</li>';
          return;
        }
        
        // 최신 기록이 맨 위로 오도록 정렬
        Object.values(data).reverse().forEach(log => {
          const li = document.createElement('li');
          li.className = "bg-slate-800 p-4 rounded-lg border border-slate-750 text-sm space-y-1";
          li.innerHTML = `
            <div class="text-xs text-gray-500 mb-1">${log.timestamp}</div>
            <div>
              <span class="text-lime-400 font-bold text-base">${log.name}</span>
              <span class="text-gray-300 ml-2">${log.sets}세트 x ${log.reps}회</span>
            </div>
          `;
          historyList.appendChild(li);
        });
      });
    }

    // ⬅️ [왼쪽 칼럼 전용] AI에게 질문하고 루틴 답변 받기 기능
    function sendQuestionToAi() {
      const questionEl = document.getElementById('ai-question');
      const questionText = questionEl.value;
      
      if(!questionText.trim()) return alert('AI 트레이너에게 물어볼 내용을 입력해주세요.');

      const aiResponseArea = document.getElementById('ai-response-area');
      const loading = document.getElementById('ai-loading');
      const responseEl = document.getElementById('ai-response');

      aiResponseArea.classList.remove('hidden');
      loading.classList.remove('hidden');
      responseEl.innerText = '';
      questionEl.value = ''; // 질문 후 입력창 비우기

      // 사용자가 입력한 질문 텍스트 그대로 GAS 웹앱으로 전송
      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ prompt: questionText })
      })
      .then(res => res.json())
      .then(data => {
        loading.classList.add('hidden');
        if(data.reply) {
          currentAiReply = data.reply;
          responseEl.innerText = data.reply;
          // 답변이 완성되어 오면 자동으로 TTS 실행
          speakResponse();
        } else if (data.error) {
          responseEl.innerText = `⚠️ 트레이너 통신 오류: ${data.error}`;
        } else {
          responseEl.innerText = "답변을 가져오는 중 알 수 없는 에러가 발생했습니다.";
        }
      })
      .catch(err => {
        loading.classList.add('hidden');
        responseEl.innerHTML = "❌ <b>네트워크 오류:</b> 구글 앱스크립트(GAS)와의 통신에 실패했습니다 주소를 확인해 주세요.";
        console.error(err);
      });
    }

    // [TTS 기능] Web Speech API 음성 출력 구현
    function speakResponse() {
      if(!currentAiReply) return alert('들으실 AI 답변 내용이 없습니다.');

      // 기존 재생 중인 음성이 있다면 완전히 멈춤
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(currentAiReply);
      utterance.lang = 'ko-KR'; // 한국어 음성 설정
      utterance.rate = 1.0;     // 보통 속도

      const voices = window.speechSynthesis.getVoices();
      const korVoice = voices.find(voice => voice.lang.includes('ko'));
      if(korVoice) utterance.voice = korVoice;

      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
